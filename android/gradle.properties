org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Kotlin incremental compilation breaks on Windows when pub cache (C:\) and project (D:\)
# are on different drives — the compiler can't resolve cross-drive relative paths.
kotlin.incremental=false
