name: rathtech_chatting_app
description: SecureChat — end-to-end encrypted private messaging for two users.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.3.0

  # Backend
  supabase_flutter: ^2.7.0

  # Functional programming (Either, Option)
  fpdart: ^1.1.0

  # Local database (Drift / SQLite)
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.26

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Preferences (non-sensitive settings)
  shared_preferences: ^2.3.3

  # Network connectivity
  connectivity_plus: ^6.1.0

  # Firebase (push notifications — wired in M7)
  firebase_core: ^3.8.0
  firebase_messaging: ^15.2.0

  # Local notifications
  flutter_local_notifications: ^18.0.1

  # Image handling
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  # Biometric / PIN app lock
  local_auth: ^2.3.0

  # Cryptography (AES-GCM for media; Signal impl in M2)
  cryptography: ^2.7.0

  # Logging
  logger: ^2.4.0

  # File paths
  path_provider: ^2.1.4
  path: ^1.9.0

  # Date formatting
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  build_runner: ^2.4.13
  drift_dev: ^2.21.0
  riverpod_generator: ^2.4.0
  custom_lint: ^0.7.0
  riverpod_lint: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
